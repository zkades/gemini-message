
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b141b">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <title>Google Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b141b;
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }
    body {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      background-color: var(--bg-color); 
      margin: 0;
      padding: 0;
      overflow: hidden;
      color: #e3e3e3;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none; /* Prevents pull-to-refresh feel on mobile */
      height: 100vh;
      height: -webkit-fill-available;
    }
    #root {
      height: 100%;
      width: 100%;
    }
    .safe-area-top {
      padding-top: var(--safe-area-top);
    }
    .safe-area-bottom {
      padding-bottom: var(--safe-area-bottom);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-slide-up {
      animation: slide-up 0.3s cubic-bezier(0, 0, 0.2, 1);
    }
    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    /* Native-like active states for buttons */
    .btn-active:active {
      background-color: rgba(255, 255, 255, 0.1);
      transform: scale(0.97);
    }
    .fab-active:active {
      filter: brightness(0.9);
      transform: scale(0.92);
    }
    input::placeholder {
      color: #9aa0a6;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
